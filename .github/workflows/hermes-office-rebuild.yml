name: Hermes Office Build & Publish

on:
  push:
    branches: [main, master]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/hermes-office-rebuild.yml"
      - "README.md"
      - "docker/**"
      - "deploy/**"
      - "skills/**"
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check base image update status
        id: check
        if: github.event_name == 'schedule'
        uses: lucacome/docker-image-update-checker@v3
        with:
          base-image: nousresearch/hermes-agent:latest
          image: ghcr.io/${{ env.OWNER }}/hermes-office:latest

      - name: Show check result
        if: github.event_name == 'schedule'
        run: |
          echo "🔍 Base image needs update: ${{ steps.check.outputs.needs-update }}"
          echo "Reason: ${{ steps.check.outputs.reason || 'N/A' }}"

      - name: Get hermes-agent version
        if: github.event_name != 'schedule' || steps.check.outputs.needs-update == 'true'
        run: |
          INSPECT=$(skopeo inspect docker://nousresearch/hermes-agent:latest 2>/dev/null)

          VERSION=$(echo "$INSPECT" | jq -r '.Labels["org.opencontainers.image.version"] // ""')
          if [ -z "$VERSION" ]; then
            VERSION=$(echo "$INSPECT" | jq -r '.Labels["version"] // ""')
          fi
          if [ -z "$VERSION" ]; then
            VERSION=$(curl -s "https://hub.docker.com/v2/repositories/nousresearch/hermes-agent/tags?page_size=100" | \
              jq -r '[.results[] | select(.name | test("^v[0-9]")) | .name] |
                     sort_by(split(".") | map(ltrimstr("v") | tonumber? // 0)) |
                     last // ""')
          fi
          if [ -z "$VERSION" ]; then
            VERSION="$(date +%Y%m%d)"
          fi

          echo "BASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "📦 Hermes-agent version: $VERSION"

      - name: Build & Push
        id: build
        if: github.event_name != 'schedule' || steps.check.outputs.needs-update == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ env.OWNER }}/hermes-office:latest
            ghcr.io/${{ env.OWNER }}/hermes-office:${{ env.BASE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Final summary
        if: always()
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ steps.check.outputs.needs-update }}" != "true" ]; then
            echo "ℹ️ No update needed this time."
          elif [ "${{ steps.build.outcome }}" = "success" ]; then
            echo "🎉 Tags pushed:"
            echo "  ghcr.io/${{ env.OWNER }}/hermes-office:latest"
            echo "  ghcr.io/${{ env.OWNER }}/hermes-office:${{ env.BASE_VERSION }}"
          else
            echo "❌ Build & Push failed or was skipped."
          fi
